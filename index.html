<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pichu Player 3.0</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;500&display=swap" rel="stylesheet">

<style>
:root {
    --bg-main: #070c23;
    --bg-sub: #121a3d;
    --accent: #d29e71;
    --black: #000000;
    --white: #FFFFFF;
    --gray: #a0a4b8;
    --danger: #ff4d4d;
}

* {
    box-sizing: border-box;
    font-family: 'Pretendard', sans-serif;
    letter-spacing: -0.01em;
}

body {
    margin: 0;
    background: var(--bg-main);
    color: var(--white);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.app {
    width: 850px;
    max-width: 100%;
    background: linear-gradient(145deg, var(--bg-main), var(--bg-sub));
    border-radius: 40px;
    padding: 40px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.05);
}

.header {
    text-align: center;
    margin-bottom: 35px;
}

.logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.player-logo {
    width: 80px;
    height: 80px;
    object-fit: contain;
}

.header h1 {
    margin: 0;
    font-size: 2.2rem;
    font-weight: 100;
    letter-spacing: 4px;
    color: var(--white);
    text-transform: uppercase;
}

.header h1 span {
    font-weight: 500;
    color: var(--accent);
}

/* 메인 버튼들 */
.main-controls {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
}

.main-controls button {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    padding: 15px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 300;
    transition: all 0.3s ease;
}

.main-controls button:hover {
    background: var(--accent);
    color: var(--black);
    border-color: var(--accent);
}

/* 재생 옵션 바 */
.playback-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.25);
    padding: 15px 25px;
    border-radius: 50px;
    margin-bottom: 25px;
}

.btn-group {
    display: flex;
    gap: 10px;
}

.option-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--gray);
    padding: 8px 16px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.3s ease;
}

.option-btn.active {
    border-color: var(--accent);
    color: var(--accent);
}

.volume-box {
    display: flex;
    align-items: center;
    gap: 12px;
}

input[type=range] {
    width: 100px;
    accent-color: var(--accent);
    cursor: pointer;
}

/* 플레이어 노출 영역 */
.player-display {
    background: rgba(0,0,0,0.4);
    border-radius: 25px;
    overflow: hidden;
    margin-bottom: 25px;
    transition: all 0.5s ease;
}

video, audio {
    width: 100%;
    display: block;
}

/* 플레이리스트 */
.playlist-container {
    background: rgba(255,255,255,0.02);
    border-radius: 25px;
    padding: 20px;
    max-height: 300px;
    overflow-y: auto;
}

.playlist-container::-webkit-scrollbar { width: 4px; }
.playlist-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

.item {
    padding: 12px 20px;
    border-radius: 50px;
    margin-bottom: 6px;
    cursor: pointer;
    font-weight: 200; /* 프리텐다드 약간 얇게 */
    color: var(--gray);
    transition: all 0.2s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.item:hover {
    background: rgba(255,255,255,0.05);
    color: var(--white);
}

.item.active {
    background: rgba(210, 158, 113, 0.1);
    color: var(--accent);
    font-weight: 400;
}

.item-info {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
}

/* 파일 형식 태그 (Noto Sans KR) */
.file-type {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    color: var(--gray);
}

/* 삭제 버튼 */
.delete-btn {
    background: none;
    border: none;
    color: var(--gray);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0 5px;
    line-height: 1;
    transition: color 0.2s;
}

.delete-btn:hover {
    color: var(--danger);
}

footer {
    margin-top: 30px;
    text-align: center;
    font-size: 0.75rem;
    font-weight: 100;
    color: var(--gray);
}

@media (max-width: 600px) {
    .playback-options { flex-direction: column; gap: 15px; border-radius: 20px; }
    .header h1 { font-size: 1.6rem; }
}
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo-container">
            <img src="logo.png" alt="Pichu Logo" class="player-logo">
            <h1>PICHU PLAYER <span>3.0</span></h1>
        </div>
    </div>

    <div class="main-controls">
        <button onclick="document.getElementById('fileInput').click()">📁 파일 추가</button>
        <button onclick="clearPlaylist()">🗑️ 리스트 초기화</button>
    </div>

    <div class="playback-options">
        <div class="btn-group">
            <button id="btnShuffle" class="option-btn" onclick="toggleShuffle()">🔀 셔플 OFF</button>
            <button id="btnRepeat" class="option-btn" onclick="toggleRepeat()">➡️ 반복 OFF</button>
        </div>
        <div class="volume-box">
            <span style="font-size:0.8rem; opacity:0.5;">VOL</span>
            <input type="range" id="volRange" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <div class="player-display" id="playerDisplay" style="display:none;">
        <input type="file" id="fileInput" accept="audio/*,video/*" multiple hidden>
        <audio id="audio" controls></audio>
        <video id="video" controls></video>
    </div>

    <div class="playlist-container">
        <div id="list"></div>
    </div>

    <footer>DESIGNED BY PICHU MEDIA</footer>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const audio = document.getElementById('audio');
const video = document.getElementById('video');
const listDiv = document.getElementById('list');
const volRange = document.getElementById('volRange');
const playerDisplay = document.getElementById('playerDisplay');

let playlist = [];
let currentIndex = -1;
let isShuffle = false;
let repeatMode = 0; 

fileInput.addEventListener('change', () => {
    for (const file of fileInput.files) {
        playlist.push(file);
    }
    render();
});

function render() {
    listDiv.innerHTML = "";
    if (playlist.length === 0) {
        playerDisplay.style.display = "none";
    }
    
    playlist.forEach((file, i) => {
        const isVideo = file.type.startsWith('video');
        const typeLabel = isVideo ? 'MP4' : 'MP3';
        
        const div = document.createElement('div');
        div.className = `item ${i === currentIndex ? 'active' : ''}`;
        
        div.innerHTML = `
            <div class="item-info" onclick="play(${i})">
                <span class="file-type">${typeLabel}</span>
                <span>${file.name}</span>
            </div>
            <button class="delete-btn" onclick="deleteItem(event, ${i})">&times;</button>
        `;
        listDiv.appendChild(div);
    });
}

function play(i) {
    if (i < 0 || i >= playlist.length) return;
    currentIndex = i;
    const file = playlist[i];
    const url = URL.createObjectURL(file);
    
    playerDisplay.style.display = "block";
    const currentVol = volRange.value;

    if (file.type.startsWith('audio')) {
        video.pause(); video.style.display = "none";
        audio.style.display = "block";
        audio.src = url; audio.volume = currentVol; audio.play();
    } else {
        audio.pause(); audio.style.display = "none";
        video.style.display = "block";
        video.src = url; video.volume = currentVol; video.play();
    }
    render();
}

// 특정 노래 삭제 기능
function deleteItem(event, index) {
    event.stopPropagation(); // 부모 클릭 이벤트(재생) 방지
    
    if (index === currentIndex) {
        audio.pause();
        video.pause();
        audio.src = "";
        video.src = "";
        currentIndex = -1;
    } else if (index < currentIndex) {
        currentIndex--; // 현재 재생 중인 인덱스 유지
    }
    
    playlist.splice(index, 1);
    render();
}

function next() {
    if (playlist.length === 0) return;
    if (repeatMode === 2) { play(currentIndex); return; }
    
    let n = currentIndex + 1;
    if (isShuffle) {
        n = Math.floor(Math.random() * playlist.length);
        if (n === currentIndex && playlist.length > 1) n = (n + 1) % playlist.length;
    } else {
        if (n >= playlist.length) {
            if (repeatMode === 1) n = 0;
            else return;
        }
    }
    play(n);
}

audio.onended = next;
video.onended = next;

volRange.oninput = (e) => {
    audio.volume = e.target.value;
    video.volume = e.target.value;
};

function toggleShuffle() {
    isShuffle = !isShuffle;
    const btn = document.getElementById('btnShuffle');
    btn.textContent = isShuffle ? "🔀 셔플 ON" : "🔀 셔플 OFF";
    btn.classList.toggle('active', isShuffle);
}

function toggleRepeat() {
    repeatMode = (repeatMode + 1) % 3;
    const btn = document.getElementById('btnRepeat');
    const labels = ["➡️ 반복 OFF", "🔁 전체 반복", "🔂 한 곡 반복"];
    btn.textContent = labels[repeatMode];
    btn.classList.toggle('active', repeatMode !== 0);
}

function clearPlaylist() {
    audio.pause(); video.pause();
    audio.src = ""; video.src = "";
    playlist = []; currentIndex = -1;
    render();
}
</script>
</body>
</html>
