<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pichu Player 3.0</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;500&display=swap" rel="stylesheet">

<style>
:root {
    --bg-main: #070c23;
    --bg-sub: #121a3d;
    --accent: #d29e71;
    --black: #000000;
    --white: #FFFFFF;
    --gray: #a0a4b8;
}

* {
    box-sizing: border-box;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: -0.01em;
}

body {
    margin: 0;
    background: var(--bg-main);
    color: var(--white);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.app {
    width: 850px;
    max-width: 100%;
    background: linear-gradient(145deg, var(--bg-main), var(--bg-sub));
    border-radius: 40px;
    padding: 40px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.05);
}

/* --- 헤더 및 이미지 로고 디자인 수정 --- */
.header {
    text-align: center;
    margin-bottom: 35px;
}

.logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px; /* 로고와 제목 사이 간격 */
}

/* 이미지 로고 스타일 */
.player-logo {
    width: 80px; /* 플레이어에 맞게 적절한 크기로 조절 (원하시는 대로 변경 가능) */
    height: 80px; /* 1:1 비율 유지 */
    object-fit: contain; /* 이미지가 잘리지 않도록 */
    /* 로고가 너무 부각되면 살짝 불투명도를 줍니다 */
    /* opacity: 0.9; */
}

.header h1 {
    margin: 0;
    font-size: 2.2rem;
    font-weight: 100;
    letter-spacing: 4px;
    color: var(--white);
    text-transform: uppercase;
}

.header h1 span {
    font-weight: 500;
    color: var(--accent);
}

.header p {
    margin: 8px 0 0;
    color: var(--gray);
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 2px;
}

/* --- 이하 컨트롤 및 플레이어 스타일은 동일 --- */
.main-controls {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
}

.main-controls button {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    padding: 15px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 300;
    transition: all 0.3s ease;
}

.main-controls button:hover {
    background: var(--accent);
    color: var(--black);
    border-color: var(--accent);
}

.playback-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.25);
    padding: 15px 25px;
    border-radius: 50px;
    margin-bottom: 25px;
}

.btn-group {
    display: flex;
    gap: 10px;
}

.option-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--gray);
    padding: 8px 16px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.3s ease;
}

.option-btn.active {
    border-color: var(--accent);
    color: var(--accent);
}

.volume-box {
    display: flex;
    align-items: center;
    gap: 12px;
}

.volume-box span { font-size: 1rem; opacity: 0.7; }

input[type=range] {
    width: 100px;
    accent-color: var(--accent);
    cursor: pointer;
    opacity: 0.8;
}

.player-display {
    background: rgba(0,0,0,0.4);
    border-radius: 25px;
    overflow: hidden;
    margin-bottom: 25px;
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
}

video, audio {
    width: 100%;
    display: block;
}

.playlist-container {
    background: rgba(255,255,255,0.02);
    border-radius: 25px;
    padding: 20px;
    max-height: 250px;
    overflow-y: auto;
}

.playlist-container::-webkit-scrollbar { width: 4px; }
.playlist-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

.playlist-container h3 {
    margin: 0 0 15px;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.item {
    padding: 14px 20px;
    border-radius: 50px;
    margin-bottom: 5px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 100;
    color: var(--gray);
    transition: all 0.2s ease;
    display: flex;
    justify-content: space-between;
}

.item:hover {
    background: rgba(255,255,255,0.05);
    color: var(--white);
}

.item.active {
    background: rgba(210, 158, 113, 0.1);
    color: var(--accent);
    font-weight: 500;
}

footer {
    margin-top: 30px;
    text-align: center;
    font-size: 0.75rem;
    font-weight: 100;
    color: var(--gray);
    letter-spacing: 1px;
}

@media (max-width: 600px) {
    .playback-options { flex-direction: column; gap: 15px; border-radius: 20px; }
    .header h1 { font-size: 1.6rem; }
    .player-logo { width: 60px; height: 60px; } /* 모바일에선 로고를 조금 줄임 */
}
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo-container">
            <img src="logo.png" alt="Pichu Logo" class="player-logo">
            <h1>PICHU PLAYER <span>3.0</span></h1>
            <p>SMARTER. BETTER. FANTASTIC.</p>
        </div>
    </div>

    <div class="main-controls">
        <button onclick="document.getElementById('fileInput').click()">📁 파일 추가</button>
        <button onclick="clearPlaylist()">🗑️ 초기화</button>
    </div>

    <div class="playback-options">
        <div class="btn-group">
            <button id="btnShuffle" class="option-btn" onclick="toggleShuffle()">🔀 셔플 OFF</button>
            <button id="btnRepeat" class="option-btn" onclick="toggleRepeat()">➡️ 반복 OFF</button>
        </div>
        <div class="volume-box">
            <span>Vol</span>
            <input type="range" id="volRange" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <div class="player-display">
        <input type="file" id="fileInput" accept="audio/*,video/*" multiple hidden>
        <audio id="audio" controls hidden></audio>
        <video id="video" controls hidden></video>
    </div>

    <div class="playlist-container">
        <h3>Playlist</h3>
        <div id="list"></div>
    </div>

    <footer>
        DESIGNED BY PICHU MEDIA
    </footer>
</div>

<script>
// 자바스크립트 코드는 이전과 동일합니다.
const fileInput = document.getElementById('fileInput');
const audio = document.getElementById('audio');
const video = document.getElementById('video');
const listDiv = document.getElementById('list');
const volRange = document.getElementById('volRange');

let playlist = [];
let currentIndex = -1;
let isShuffle = false;
let repeatMode = 0; // 0: OFF, 1: ALL, 2: ONE

fileInput.addEventListener('change', () => {
    for (const file of fileInput.files) {
        playlist.push(file);
    }
    render();
});

function render() {
    listDiv.innerHTML = "";
    playlist.forEach((file, i) => {
        const div = document.createElement('div');
        div.className = `item ${i === currentIndex ? 'active' : ''}`;
        div.innerHTML = `<span>${i + 1}. ${file.name}</span>`;
        div.onclick = () => play(i);
        listDiv.appendChild(div);
    });
}

function play(i) {
    if (i < 0 || i >= playlist.length) return;
    currentIndex = i;
    const file = playlist[i];
    const url = URL.createObjectURL(file);
    
    const currentVol = volRange.value;
    audio.volume = currentVol;
    video.volume = currentVol;

    if (file.type.startsWith('audio')) {
        video.pause(); video.hidden = true;
        audio.hidden = false; audio.src = url; audio.play();
    } else {
        audio.pause(); audio.hidden = true;
        video.hidden = false; video.src = url; video.play();
    }
    render();
}

function next() {
    if (playlist.length === 0) return;
    if (repeatMode === 2) { play(currentIndex); return; }
    
    let n = currentIndex + 1;
    if (isShuffle) {
        n = Math.floor(Math.random() * playlist.length);
        if (n === currentIndex && playlist.length > 1) n = (n + 1) % playlist.length;
    } else {
        if (n >= playlist.length) {
            if (repeatMode === 1) n = 0;
            else return;
        }
    }
    play(n);
}

audio.onended = next;
video.onended = next;

volRange.oninput = (e) => {
    audio.volume = e.target.value;
    video.volume = e.target.value;
};

function toggleShuffle() {
    isShuffle = !isShuffle;
    const btn = document.getElementById('btnShuffle');
    btn.textContent = isShuffle ? "🔀 셔플 ON" : "🔀 셔플 OFF";
    btn.classList.toggle('active', isShuffle);
}

function toggleRepeat() {
    repeatMode = (repeatMode + 1) % 3;
    const btn = document.getElementById('btnRepeat');
    const labels = ["➡️ 반복 OFF", "🔁 전체 반복", "🔂 한 곡 반복"];
    btn.textContent = labels[repeatMode];
    btn.classList.toggle('active', repeatMode !== 0);
}

function clearPlaylist() {
    audio.pause(); video.pause();
    playlist = []; currentIndex = -1;
    render();
}
</script>
</body>
</html>
